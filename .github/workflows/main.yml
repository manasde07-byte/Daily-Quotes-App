name: Android CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4  # v3 থেকে v4 করা হয়েছে

    - name: set up JDK 17
      uses: actions/setup-java@v4 # v3 থেকে v4 করা হয়েছে
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4 # v3 থেকে v4 করা হয়েছে
      with:
        name: Daily-Quotes-Bangla-APK
        path: app/build/outputs/apk/debug/*.apk
        
        
